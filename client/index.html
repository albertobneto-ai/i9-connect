<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>i9 Connect</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a1a1a'/><text x='16' y='22' text-anchor='middle' font-family='Arial' font-weight='bold' font-size='16' fill='white'>i9</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111;--bg2:#1a1a1a;--bg3:#222;--bg4:#2d2d2d;
  --border:#333;--border2:#444;
  --text:#e0e0e0;--text2:#aaa;--text3:#777;
  --accent:#4a9eff;--accent2:#3a7edf;
  --green:#2ecc71;--red:#e74c3c;--orange:#f39c12;--yellow:#f1c40f;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
input,button,textarea,select{font-family:inherit;outline:none}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ═══ LOGIN ═══ */
#login-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(145deg,#0a0a0a,#1a1a1a)}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:40px;width:380px;text-align:center}
.login-logo{font-size:28px;font-weight:800;color:#fff;margin-bottom:4px;letter-spacing:-1px}
.login-sub{font-size:12px;color:var(--text3);margin-bottom:28px}
.login-input{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;margin-bottom:12px}
.login-input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:10px}
.login-btn:hover{background:var(--accent2)}
.login-toggle{font-size:12px;color:var(--accent);cursor:pointer;background:none;border:none}
.login-error{color:var(--red);font-size:11px;margin-bottom:8px;min-height:16px}

/* ═══ MAIN LAYOUT ═══ */
#app{display:none;height:100vh;grid-template-columns:260px 1fr 0px;grid-template-rows:1fr}
#app.active{display:grid}
#app.panel-open{grid-template-columns:260px 1fr 280px}

/* ═══ SIDEBAR ═══ */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-brand{font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.5px}
.sidebar-brand span{color:var(--accent);font-weight:400}
.sidebar-section{padding:12px 18px 6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text3);display:flex;align-items:center;justify-content:space-between}
.sidebar-section button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;line-height:1}
.sidebar-section button:hover{color:var(--accent)}
.channel-list{flex:1;overflow-y:auto;padding:4px 8px}
.channel-item{padding:7px 12px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);margin-bottom:1px;position:relative}
.channel-item:hover{background:var(--bg3)}
.channel-item.active{background:var(--bg4);color:#fff}
.channel-icon{font-size:15px;flex-shrink:0;width:20px;text-align:center}
.channel-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.channel-badge{background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:16px;text-align:center}

/* User item */
.user-item{padding:6px 12px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);margin-bottom:1px}
.user-item:hover{background:var(--bg3)}
.user-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;position:relative}
.user-avatar .status-dot{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg2)}
.status-dot.online{background:var(--green)}
.status-dot.offline{background:var(--text3)}
.status-dot.away{background:var(--orange)}
.status-dot.busy{background:var(--red)}

/* Self */
.sidebar-footer{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-footer .user-avatar{width:32px;height:32px;font-size:12px}
.self-info{flex:1;overflow:hidden}
.self-name{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.self-status{font-size:10px;color:var(--text3)}
.self-actions{display:flex;gap:6px}
.self-actions button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px}
.self-actions button:hover{color:var(--accent)}

/* ═══ CHAT AREA ═══ */
.chat-area{display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.chat-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);min-height:52px}
.chat-header-left{display:flex;align-items:center;gap:10px}
.chat-header-icon{font-size:18px}
.chat-header-name{font-size:15px;font-weight:600;color:#fff}
.chat-header-desc{font-size:11px;color:var(--text3)}
.chat-header-actions{display:flex;gap:6px}
.chat-header-actions button{background:var(--bg4);border:1px solid var(--border2);color:#fff;cursor:pointer;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px}
.chat-header-actions button:hover{background:#444;border-color:#555}
.chat-header-actions button.active-call{background:var(--green);color:#fff;border-color:var(--green)}

/* Messages */
.messages-container{flex:1;overflow-y:auto;padding:16px 20px}
.message{display:flex;gap:10px;margin-bottom:14px;padding:4px 8px;border-radius:6px}
.message:hover{background:rgba(255,255,255,0.02)}
.msg-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;margin-top:2px}
.msg-avatar.bot-avatar{background:linear-gradient(135deg,#4a9eff,#2ecc71);font-size:18px;box-shadow:0 0 0 2px #1a1a1a,0 0 0 4px rgba(74,158,255,0.3)}

/* Suggestion card (collapsible) */
.msg-suggestion{background:var(--bg3);border:1px solid var(--border);border-left:3px solid #4a9eff;border-radius:0 8px 8px 0;margin-top:6px;cursor:pointer;overflow:hidden;transition:all 0.2s}
.msg-suggestion:hover{border-left-color:#2ecc71;background:var(--bg4)}
.suggestion-header{padding:8px 14px;display:flex;align-items:center;gap:8px}
.suggestion-icon{font-size:16px}
.suggestion-label{font-size:11px;font-weight:600;color:#4a9eff;flex:1}
.suggestion-toggle{font-size:10px;color:var(--text3);transition:transform 0.2s}
.msg-suggestion.expanded .suggestion-toggle{transform:rotate(90deg)}
.suggestion-body{max-height:0;overflow:hidden;transition:max-height 0.3s ease;padding:0 14px}
.msg-suggestion.expanded .suggestion-body{max-height:2000px;padding:0 14px 12px}
.suggestion-body-text{font-size:12px;color:var(--text);line-height:1.6;white-space:pre-wrap}
.msg-body{flex:1;min-width:0}
.msg-header{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.msg-author{font-size:13px;font-weight:600;color:#fff}
.msg-time{font-size:10px;color:var(--text3)}
.msg-content{font-size:13px;color:var(--text);line-height:1.5;word-wrap:break-word;white-space:pre-wrap}
.msg-content.bot{background:var(--bg3);padding:10px 14px;border-radius:0 8px 8px 8px;border-left:3px solid var(--accent);margin-top:4px}
.msg-content.system{color:var(--text3);font-style:italic;font-size:12px}

.typing-indicator{padding:4px 20px;font-size:11px;color:var(--text3);font-style:italic;min-height:20px}

/* Input */
.chat-input-area{padding:12px 20px;border-top:1px solid var(--border);background:var(--bg2)}
.chat-input-row{display:flex;gap:8px;align-items:flex-end}
.chat-input{flex:1;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;resize:none;max-height:120px;min-height:40px}
.chat-input:focus{border-color:var(--accent)}
.chat-send-btn{padding:10px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;flex-shrink:0;height:40px}
.chat-send-btn:hover{background:var(--accent2)}
.chat-send-btn:disabled{opacity:0.4;cursor:default}
.bot-hint{font-size:10px;color:var(--text3);margin-top:4px}

/* ═══ RIGHT PANEL ═══ */
.right-panel{background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-header{padding:14px 16px;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);display:flex;align-items:center;justify-content:space-between}
.panel-header button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px}
.panel-header button:hover{color:var(--red)}
.panel-content{flex:1;overflow-y:auto;padding:12px 14px}

/* Call UI */
.call-banner{background:linear-gradient(135deg,#1a472a,#2a6e3f);border:1px solid #2ecc71;border-radius:8px;padding:14px;margin-bottom:12px;text-align:center}
.call-banner h3{font-size:13px;font-weight:600;color:#2ecc71;margin-bottom:6px}
.call-banner p{font-size:11px;color:#a0d4b0;margin-bottom:10px}
.call-participants{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:10px}
.call-participant{display:flex;flex-direction:column;align-items:center;gap:4px}
.call-participant .user-avatar{width:36px;height:36px}
.call-participant span{font-size:10px;color:var(--text2)}
.call-controls{display:flex;gap:8px;justify-content:center}
.call-btn{padding:8px 14px;border:none;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px}
.call-btn.mute{background:var(--bg4);color:var(--text)}
.call-btn.mute.muted{background:var(--red);color:#fff}
.call-btn.hang{background:var(--red);color:#fff}
.call-btn:hover{opacity:0.85}

/* ═══ VIDEO CALL PANEL (inline no chat) ═══ */
.call-panel{display:none;background:#111;border-bottom:1px solid var(--border);overflow:hidden}
.call-panel.active{display:flex;flex-direction:column}
.call-panel-header{padding:8px 16px;display:flex;align-items:center;justify-content:space-between;background:#0d0d0d}
.call-panel-header .call-info{display:flex;align-items:center;gap:10px}
.call-panel-header .call-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse-dot 1.5s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.4}}
.call-panel-header .call-label{font-size:12px;font-weight:600;color:var(--green)}
.call-panel-header .call-duration{font-size:11px;color:var(--text3);font-variant-numeric:tabular-nums;margin-left:6px}
.call-panel-videos{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;align-items:center;min-height:140px}
.call-panel-videos .video-cell{position:relative;width:180px;min-width:160px;height:125px;flex-shrink:0;background:#1a1a1a;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.call-panel-videos .video-cell video{width:100%;height:100%;object-fit:cover;border-radius:8px}
.call-panel-videos .video-cell .video-label{position:absolute;bottom:4px;left:6px;background:rgba(0,0,0,0.65);color:#fff;font-size:9px;font-weight:600;padding:2px 8px;border-radius:10px}
.call-panel-videos .video-cell.camera-off{background:#2d2d2d}
.call-panel-videos .video-cell.camera-off .avatar-placeholder{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff}
.call-panel-videos .local-cell{border:2px solid var(--green)}
.call-panel-videos .local-cell video{transform:scaleX(-1)}
.call-panel-controls{display:flex;align-items:center;justify-content:center;gap:10px;padding:6px 12px 10px;background:#0d0d0d}
.ctl-btn{width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
.ctl-btn.mic{background:var(--bg4);color:#fff}
.ctl-btn.mic.off{background:var(--red);color:#fff}
.ctl-btn.cam{background:var(--bg4);color:#fff}
.ctl-btn.cam.off{background:var(--red);color:#fff}
.ctl-btn.hangup{background:var(--red);color:#fff;width:42px;height:42px;font-size:17px}
.ctl-btn:hover{opacity:0.85}

/* Notification items */
.notif-item{padding:10px 12px;border-radius:6px;background:var(--bg);margin-bottom:6px;border-left:3px solid var(--accent)}
.notif-item.unread{border-left-color:var(--yellow)}
.notif-title{font-size:11px;font-weight:600;color:#fff;margin-bottom:2px}
.notif-content{font-size:11px;color:var(--text2)}
.notif-time{font-size:9px;color:var(--text3);margin-top:3px}

/* ═══ MODAL ═══ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:28px;width:360px}
.modal-box h3{font-size:15px;font-weight:700;color:#fff;margin-bottom:14px}
.modal-box .login-input{margin-bottom:10px}
.modal-box .login-btn{margin-top:6px}

/* Status selector */
.status-select{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 8px;font-size:11px;cursor:pointer}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:13px}
/* ═══ MODEL SELECTOR ═══ */
.model-selector{display:flex;align-items:center;gap:6px;padding:4px 0 0}
.model-btn{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:10px;color:var(--accent);cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:600;position:relative}
.model-btn:hover{border-color:var(--accent);background:var(--bg3)}
.model-btn .model-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.model-dropdown{display:none;position:absolute;bottom:28px;left:0;background:var(--bg2);border:1px solid var(--border);border-radius:8px;min-width:260px;z-index:20;box-shadow:0 4px 20px rgba(0,0,0,0.5);overflow:hidden}
.model-dropdown.open{display:block}
.model-dropdown-title{padding:8px 12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);border-bottom:1px solid var(--border)}
.model-option{padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border)}
.model-option:last-child{border-bottom:none}
.model-option:hover{background:var(--bg3)}
.model-option.active{background:var(--bg4);color:#fff}
.model-option .mo-name{flex:1;font-weight:500}
.model-option .mo-provider{font-size:9px;color:var(--text3)}
.model-option .mo-badge{font-size:8px;font-weight:700;padding:1px 5px;border-radius:8px;text-transform:uppercase}
.mo-badge.free{background:rgba(46,204,113,0.2);color:var(--green)}
.mo-badge.paid{background:rgba(74,158,255,0.2);color:var(--accent)}
.mo-badge.unstable{background:rgba(241,196,15,0.2);color:var(--yellow)}

/* ═══ ORG SELECTOR ═══ */
.org-selector-wrap{padding:8px 14px}
.org-select{width:100%;padding:7px 10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;cursor:pointer}
.org-select:focus{border-color:var(--accent)}
.org-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px}

/* ═══ HAMBURGER ═══ */
.hamburger{display:none;background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px 8px;margin-right:8px}
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9}
.sidebar-backdrop.active{display:block}

/* ═══ MOBILE ═══ */
@media(max-width:768px){
  #app.active{grid-template-columns:1fr}
  #app.panel-open{grid-template-columns:1fr}
  .sidebar{position:fixed;left:-280px;top:0;bottom:0;width:280px;z-index:10;transition:left 0.25s ease}
  .sidebar.open{left:0}
  .hamburger{display:block}
  .right-panel{position:fixed;right:-280px;top:0;bottom:0;width:280px;z-index:10;transition:right 0.25s ease}
  #app.panel-open .right-panel{right:0}
  .chat-header-actions button{padding:6px 8px;font-size:12px}
  .chat-header-actions button span.btn-text{display:none}
  .call-panel-videos .video-cell{width:140px;min-width:120px;height:105px}
  .ctl-btn{width:34px;height:34px;font-size:14px}
  .ctl-btn.hangup{width:38px;height:38px;font-size:16px}
  .msg-avatar{width:30px;height:30px;font-size:11px}
  .message{gap:8px}
  .msg-content{font-size:12px}
  .chat-input{font-size:14px}
  .login-box{width:90vw;max-width:380px}
}
</style>
<!-- i18n-build-1781625008 -->
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">i9 Connect</div>
    <div class="login-sub" data-i18n="subtitle">Comunicação integrada ao Ever i9</div>
    <div class="login-error" id="login-error"></div>
    <input class="login-input" id="auth-display" placeholder="Nome de exibição" data-i18n-placeholder="auth_display_name" style="display:none">
    <input class="login-input" id="auth-user" placeholder="Usuário" data-i18n-placeholder="auth_username">
    <input class="login-input" id="auth-pass" placeholder="Senha" data-i18n-placeholder="auth_password" type="password">
    <button class="login-btn" id="auth-btn" onclick="doAuth()" data-i18n="auth_login">Entrar</button>
    <button class="login-toggle" id="auth-toggle" onclick="toggleAuth()" data-i18n="auth_toggle_register">Não tem conta? Criar uma</button>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app">
  <!-- Sidebar Backdrop (mobile) -->
  <div class="sidebar-backdrop" id="sidebar-backdrop" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">i9 <span>Connect</span></div>
      <button onclick="toggleNotifPanel()" title="Notificações" data-i18n-title="notifications" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;position:relative" id="notif-btn">
        🔔 <span id="notif-count" style="display:none;position:absolute;top:-4px;right:-6px;background:var(--red);color:#fff;font-size:8px;padding:1px 4px;border-radius:8px;font-weight:700"></span>
      </button>
    </div>

    <div class="sidebar-section"><span data-i18n="channels">Canais</span> <button onclick="showCreateChannel()" title="Criar canal" data-i18n-title="create_channel_tooltip">+</button></div>
    <div class="channel-list" id="channel-list"></div>

    <div class="sidebar-section"><span data-i18n="direct_messages">Mensagens Diretas</span> <button onclick="showCreateDM()" title="Nova DM" data-i18n-title="new_dm_tooltip">+</button></div>
    <div class="channel-list" id="dm-list" style="max-height:180px"></div>

    <div class="sidebar-section">Online</div>
    <div class="channel-list" id="online-list" style="max-height:140px"></div>

    <div class="sidebar-section">Org Salesforce</div>
    <div class="org-selector-wrap">
      <select class="org-select" id="org-selector" onchange="selectOrg(this.value)">
        <option value="default">Dev Org (Algar)</option>
        <option value="1">DevEvery (Read-only)</option>
      </select>
    </div>

    <div class="sidebar-footer">
      <div class="user-avatar" id="self-avatar" style="background:var(--accent)">
        <div class="status-dot online"></div>
      </div>
      <div class="self-info">
        <div class="self-name" id="self-name">—</div>
        <select class="status-select" id="self-status" onchange="setStatus(this.value)">
          <option value="online" data-i18n="status_online">Online</option>
          <option value="away" data-i18n="status_away">Ausente</option>
          <option value="busy" data-i18n="status_busy">Ocupado</option>
        </select>
      </div>
      <div class="self-actions">
        <button onclick="logout()" title="Sair" data-i18n-title="status_logout">⏻</button>

  const langBtn = document.getElementById('lang-toggle');

}

  if (btn) btn.textContent = newLang === 'en' ? 'PT' : 'EN';

// ═══ AUTH ═══
function toggleAuth() {
  isRegistering = !isRegistering;
  document.getElementById('auth-display').style.display = isRegistering ? 'block' : 'none';
  document.getElementById('auth-btn').textContent = isRegistering ? t('auth_register') : t('auth_login');
  document.getElementById('auth-toggle').textContent = isRegistering ? t('auth_toggle_login') : t('auth_toggle_register');
}

async function doAuth() {
  const username = document.getElementById('auth-user').value.trim();
  const password = document.getElementById('auth-pass').value;
  const display_name = document.getElementById('auth-display').value.trim();
  const errEl = document.getElementById('login-error');
  if (!username || !password) { errEl.textContent = 'Preencha todos os campos'; return; }
  if (isRegistering && !display_name) { errEl.textContent = t('auth_fill_display'); return; }
  try {
    const endpoint = isRegistering ? '/api/auth/register' : '/api/auth/login';
    const body = isRegistering ? { username, password, display_name } : { username, password };
    const res = await fetch(API + endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Erro'; return; }
    token = data.token;
    currentUser = data.user;
    localStorage.setItem('i9c_token', token);
    localStorage.setItem('i9c_user', JSON.stringify(currentUser));
    startApp();
  } catch (e) { errEl.textContent = t('auth_error'); }
}

function logout() {
  localStorage.removeItem('i9c_token');
  localStorage.removeItem('i9c_user');
  if (socket) socket.disconnect();
  location.reload();
}

// ═══ APP INIT ═══
function startApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.getElementById('self-name').textContent = currentUser.display_name;
  const av = document.getElementById('self-avatar');
  av.style.background = currentUser.avatar_color || 'var(--accent)';
  av.childNodes[0].textContent = initials(currentUser.display_name);

  connectSocket();
  loadChannels();
  loadUsers();
  loadDMs();
  loadModels();
}

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
}

// ═══ SOCKET ═══
function connectSocket() {
  socket = io({ auth: { token } });

  socket.on('connect', () => {
    console.log('[WS] Connected/Reconnected');
    // Rejoin active channel room after reconnection
    if (activeView?.type === 'channel') {
      socket.emit('channel:join', activeView.id);
    }
  });
  socket.on('disconnect', () => console.log('[WS] Disconnected — will auto-reconnect'));
  socket.on('connect_error', (err) => { console.error('[WS] Error:', err.message); if (err.message === 'Invalid token') logout(); });

  socket.on('message:new', (msg) => {
    if (activeView?.type === 'channel' && msg.channel_id === activeView.id) {
      appendMessage(msg);
      scrollToBottom();
    }
  });

  socket.on('dm:new', (msg) => {
    if (activeView?.type === 'dm' && msg.dm_channel_id === activeView.id) {
      appendMessage(msg);
      scrollToBottom();
    }
  });

  socket.on('presence:update', (data) => {
    const idx = users.findIndex(u => u.id === data.userId);
    if (idx >= 0) users[idx].status = data.status;
    renderOnlineList();
  });

  socket.on('typing:update', (data) => {
    if (data.typing) {
      document.getElementById('typing-indicator').textContent = `${data.display_name} ${t('is_typing')}`;
    } else {
      document.getElementById('typing-indicator').textContent = '';
    }
  });

  socket.on('channel:created', (ch) => {
    channels.push(ch);
    renderChannels();
  });

  socket.on('notification:new', (notif) => {
    updateNotifBadge();
  });

  socket.on('chat:cleared', (data) => {
    if (activeView?.type === 'channel' && data.channelId === activeView.id) {
      document.getElementById('messages-container').innerHTML = `<div class="empty-state"><div class="icon">🗂️</div><p>${t('chat_cleaned')}</p></div>`;
      loadChannels();
    }
  });

  // WebRTC events
  socket.on('call:started', (data) => {
    if (activeView?.type === 'channel' && data.channelId === activeView.id) {
      appendSystemMessage(`📹 ${data.startedBy} ${t('call_started')}`);
    }
  });

  socket.on('call:joined', (data) => {
    inCall = true;
    updateCallUI();
    // Connect to existing peers
    if (data.peers) {
      for (const peerId of data.peers) {
        createPeerConnection(peerId, true);
      }
    }
  });

  socket.on('call:peer-joined', async (data) => {
    appendSystemMessage(`📹 ${data.display_name} ${t('call_joined')}`);
  });

  socket.on('call:signal', async (data) => {
    const { from, signal } = data;
    try {
      if (signal.type === 'offer') {
        const pc = createPeerConnection(from, false);
        await pc.setRemoteDescription(new RTCSessionDescription(signal));
        pc._remoteSet = true;
        await flushCandidateBuffer(pc);
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        socket.emit('call:signal', { to: from, signal: pc.localDescription });
        console.log('[WebRTC] Answer sent to', from);
        setTimeout(() => {
          const cell = document.getElementById('cell-' + from);
          if (cell && data.display_name) cell.querySelector('.video-label').textContent = data.display_name;
        }, 200);
      } else if (signal.type === 'answer') {
        const pc = peerConnections[from];
        if (pc) {
          await pc.setRemoteDescription(new RTCSessionDescription(signal));
          pc._remoteSet = true;
          await flushCandidateBuffer(pc);
          console.log('[WebRTC] Answer received from', from);
        }
      } else if (signal.candidate) {
        const pc = peerConnections[from];
        if (pc) {
          if (pc._remoteSet) {
            await pc.addIceCandidate(new RTCIceCandidate(signal));
          } else {
            pc._candidateBuffer = pc._candidateBuffer || [];
            pc._candidateBuffer.push(signal);
          }
        }
      }
    } catch (err) { console.error('[WebRTC] Signal error:', err); }
  });

  socket.on('call:peer-left', (data) => {
    if (peerConnections[data.socketId]) {
      peerConnections[data.socketId].close();
      delete peerConnections[data.socketId];
      const cell = document.getElementById('cell-' + data.socketId);
      if (cell) cell.remove();
      updateVideoGrid();
    }
    appendSystemMessage(`📹 ${data.display_name || t('participant')} ${t('call_left')}`);
  });

  socket.on('call:ended', () => {
    endCall();
    appendSystemMessage(`📹 ${t('call_ended')}`);
  });
}

async function apiFetch(url, opts = {}) {
  const res = await fetch(API + url, { ...opts, headers: { ...opts.headers, 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' } });

}

async function openChannel(ch) {
  activeView = { type: 'channel', id: ch.id, name: ch.name };
  document.getElementById('chat-icon').textContent = '#';

function renderMessages(msgs) {
  const container = document.getElementById('messages-container');
  if (!msgs.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">💬</div><p>${t('no_messages')}</p></div>`;
    return;
  }
  container.innerHTML = msgs.map(m => messageHTML(m)).join('');
}

function messageHTML(m) {
  const isBot = m.type === 'bot' || m.type === 'system';
  const isSuggestion = m.type === 'suggestion';
  const time = new Date(m.created_at).toLocaleString(getLocale(), { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });

  // Suggestion card (collapsible)
  if (isSuggestion) {
    return `<div class="message" style="padding-left:52px">
      <div class="msg-suggestion" onclick="this.classList.toggle('expanded')">
        <div class="suggestion-header">
          <span class="suggestion-icon">🤖</span>
          <span class="suggestion-label">${t('bot_detected')}</span>
          <span class="suggestion-toggle">▶</span>
        </div>
        <div class="suggestion-body">
          <div class="suggestion-body-text">${escapeHtml(m.content)}</div>
        </div>
      </div>
    </div>`;
  }

  const contentClass = m.type === 'bot' ? 'msg-content bot' : m.type === 'system' ? 'msg-content system' : 'msg-content';
  const avatarHTML = isBot
    ? '<div class="msg-avatar bot-avatar">🤖</div>'
    : `<div class="msg-avatar" style="background:${m.avatar_color || '#555'}">${initials(m.display_name || '?')}</div>`;
  const authorName = isBot ? 'i9 Bot' : (m.display_name || t('system_label'));
  return `<div class="message">
    ${avatarHTML}
    <div class="msg-body">
      <div class="msg-header">
        <span class="msg-author" ${isBot ? 'style="color:#4a9eff"' : ''}>${authorName}</span>
        <span class="msg-time">${time}</span>
      </div>
      <div class="${contentClass}">${escapeHtml(m.content)}</div>
    </div>
  </div>`;
}

function appendMessage(m) {
  const container = document.getElementById('messages-container');
  if (container.querySelector('.empty-state')) container.innerHTML = '';
  container.insertAdjacentHTML('beforeend', messageHTML(m));
}

function appendSystemMessage(text) {
  const container = document.getElementById('messages-container');
  container.insertAdjacentHTML('beforeend',
    `<div class="message"><div class="msg-body"><div class="msg-content system">${text}</div></div></div>`);
  scrollToBottom();
}

function scrollToBottom() {
  const c = document.getElementById('messages-container');
  setTimeout(() => c.scrollTop = c.scrollHeight, 50);
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ═══ SEND MESSAGE ═══
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content || !activeView) return;

  // @orgsf command (any channel)
  if (activeView.type === 'channel' && content.toLowerCase().startsWith('@orgsf')) {
    const command = content.replace(/^@orgsf\s*/i, '');
    socket.emit('message:send', { channel_id: activeView.id, content });
    input.value = '';
    input.style.height = 'auto';
    updateSendBtn();
    apiFetch('/api/orgsf', { method: 'POST', body: JSON.stringify({ command, org_id: selectedOrg, channel_id: activeView.id }) }).catch(() => {});
    if (window.innerWidth < 768) closeSidebar();
    return;
  }

  // @bot explicit query (any channel)
  if (activeView.type === 'channel' && content.toLowerCase().startsWith('@bot')) {
    const question = content.replace(/^@bot\s*/i, '');
    socket.emit('message:send', { channel_id: activeView.id, content });
    input.value = '';
    input.style.height = 'auto';
    updateSendBtn();
    // Ask bot (response arrives via socket, HTTP may timeout on Heroku - that's OK)
    apiFetch('/api/bot/ask', { method: 'POST', body: JSON.stringify({ question, channel_id: activeView.id, model: selectedModel }) }).catch(() => {});
    return;
  }

  // Normal message (backend auto-detects Salesforce context)
  if (activeView.type === 'channel') {
    socket.emit('message:send', { channel_id: activeView.id, content });
  } else if (activeView.type === 'dm') {
    socket.emit('dm:send', { dm_channel_id: activeView.id, content });
  }
  input.value = '';
  input.style.height = 'auto';
  updateSendBtn();
  socket.emit('typing:stop', { channel_id: activeView?.id });
}

function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  updateSendBtn();
}

function updateSendBtn() {
  document.getElementById('send-btn').disabled = !document.getElementById('msg-input').value.trim();
}

function handleTyping() {
  updateSendBtn();
  if (!activeView) return;
  socket.emit('typing:start', { channel_id: activeView.id });
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => socket.emit('typing:stop', { channel_id: activeView.id }), 2000);
  // Auto-resize
  const input = document.getElementById('msg-input');
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
}

async function toggleCall() {

  try {

    if (existingCall) {
      socket.emit('call:join', { call_id: existingCall.id });

    appendSystemMessage(t('perm_camera'));

function createPeerConnection(peerId, initiator) {
  if (peerConnections[peerId]) return peerConnections[peerId];
  console.log('[WebRTC] Creating PC for', peerId, 'initiator:', initiator);
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  pc._candidateBuffer = [];
  pc._remoteSet = false;
  peerConnections[peerId] = pc;

  if (localStream) {
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
  }

  pc.onicecandidate = (e) => {
    if (e.candidate) {
      socket.emit('call:signal', { to: peerId, signal: e.candidate });
    }
  };

  pc.ontrack = (e) => {
    console.log('[WebRTC] ontrack from', peerId);
    let cell = document.getElementById('cell-' + peerId);
    if (!cell) {
      cell = document.createElement('div');
      cell.id = 'cell-' + peerId;
      cell.className = 'video-cell';
      cell.innerHTML = '<video autoplay playsinline></video><div class="video-label">Participante</div>';
      document.getElementById('video-grid').appendChild(cell);
    }
    const video = cell.querySelector('video');
    if (e.streams && e.streams[0]) video.srcObject = e.streams[0];
    video.play().catch(() => {});
  };

  pc.oniceconnectionstatechange = () => {
    console.log('[WebRTC] ICE state:', pc.iceConnectionState);
    if (pc.iceConnectionState === 'failed') pc.restartIce();
  };

  if (initiator) {
    pc.createOffer().then(offer => pc.setLocalDescription(offer))
      .then(() => socket.emit('call:signal', { to: peerId, signal: pc.localDescription }))
      .catch(err => console.error('[WebRTC] Offer error:', err));
  }
  return pc;
}

async function flushCandidateBuffer(pc) {
  if (!pc._candidateBuffer) return;
  for (const c of pc._candidateBuffer) {
    try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch {}
  }
  pc._candidateBuffer = [];
  pc._remoteSet = true;
}

function endCall() {
  inCall = false;
  isMuted = false;
  isVideoOff = false;
  stopTranscription();
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  Object.values(peerConnections).forEach(pc => pc.close());
  peerConnections = {};
  // Clean panel: remove remote cells, keep local cell
  const grid = document.getElementById('video-grid');
  grid.querySelectorAll('.video-cell:not(.local-cell)').forEach(el => el.remove());
  document.getElementById('local-video').srcObject = null;
  // Hide panel
  document.getElementById('call-panel').classList.remove('active');
  // Reset buttons
  document.getElementById('btn-mic').classList.remove('off');
  document.getElementById('btn-cam').classList.remove('off');
  // Timer
  if (callTimerInterval) { clearInterval(callTimerInterval); callTimerInterval = null; }
  document.getElementById('call-duration').textContent = '00:00';
  updateCallUI();
}

function toggleMute() {

// ═══ SPEECH-TO-TEXT TRANSCRIPTION ═══
// ═══ TRANSCRIPTION — Debounce 3s ═══
let txBuffer = '';
let txTimer = null;
let capBuffer = '';
let capTimer = null;
const SPEECH_PAUSE_MS = 3000;

function flushBuffer(buf, prefix) {
  const text = buf.trim();
  if (text.length > 1 && activeView?.type === 'channel') {
    socket.emit('message:send', { channel_id: activeView.id, content: prefix + text, type: 'text' });
  }
}

function buildRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.continuous = true;
  r.interimResults = true;
  r.lang = currentLang === 'en' ? 'en-US' : 'pt-BR';
  r.maxAlternatives = 1;
  return r;
}

// ── Toggle Transcription (💬 button — in-call or standalone) ──
function toggleTranscription() {
  if (isTranscribing) { stopTranscription(); } else { startTranscription(); }
}

function startTranscription() {
  recognition = buildRecognition();
  if (!recognition) { appendSystemMessage(t('transcription_unsupported')); return; }

  txBuffer = '';
  clearTimeout(txTimer); txTimer = null;

  recognition.onresult = (event) => {
    let full = '';
    for (let i = 0; i < event.results.length; i++) { full += event.results[i][0].transcript; }
    txBuffer = full.trim();
    clearTimeout(txTimer);
    txTimer = setTimeout(() => {
      flushBuffer(txBuffer, '🎤 ');
      txBuffer = '';
    }, SPEECH_PAUSE_MS);
  };

  recognition.onerror = (event) => {
    if (event.error === 'no-speech' || event.error === 'aborted') return;
    console.error('[TX] Error:', event.error);
    if (event.error === 'not-allowed') { appendSystemMessage(t('perm_mic_denied')); stopTranscription(); }
  };

  recognition.onend = function txOnEnd() {
    if (!isTranscribing) return;
    if (txBuffer.trim().length > 1) { flushBuffer(txBuffer, '🎤 '); txBuffer = ''; }
    clearTimeout(txTimer); txTimer = null;
    setTimeout(() => {
      if (!isTranscribing) return;
      recognition = buildRecognition();
      if (!recognition) return;
      txBuffer = '';
      recognition.onresult = (ev) => {
        let full = '';
        for (let i = 0; i < ev.results.length; i++) { full += ev.results[i][0].transcript; }
        txBuffer = full.trim();
        clearTimeout(txTimer);
        txTimer = setTimeout(() => { flushBuffer(txBuffer, '🎤 '); txBuffer = ''; }, SPEECH_PAUSE_MS);
      };
      recognition.onerror = (ev) => { if (ev.error !== 'no-speech' && ev.error !== 'aborted') console.error('[TX]', ev.error); };
      recognition.onend = txOnEnd;
      try { recognition.start(); } catch (e) { console.log('[TX] Restart failed:', e.message); }
    }, 200);
  };

  try {
    recognition.start();
    isTranscribing = true;
    const btn = document.getElementById('btn-transcribe');
    btn.style.background = '#4a9eff';
    btn.title = t('transcription_active_title');
    appendSystemMessage(t('transcription_activated'));
  } catch (err) {
    appendSystemMessage(t('error_transcription') + ': ' + err.message);
  }
}

function stopTranscription() {
  isTranscribing = false;
  if (txBuffer.trim().length > 1) { flushBuffer(txBuffer, '🎤 '); }
  txBuffer = ''; clearTimeout(txTimer); txTimer = null;
  if (recognition) { try { recognition.stop(); } catch {} recognition = null; }
  const btn = document.getElementById('btn-transcribe');
  if (btn) { btn.style.background = 'var(--bg4)'; btn.title = t('transcribe_audio'); }
}

// ═══ AUDIO CAPTURE (🔊 button — standalone mic capture) ═══
let captureStream = null;
let captureMicStream = null;
let captureRecorder = null;
let captureAudioCtx = null;
let captureInterval = null;
let isCapturing = false;
let captureRecognition = null;

function startAudioCapture() {
  if (isCapturing) { stopAudioCapture(); return; }
  if (!activeView || activeView.type !== 'channel') { appendSystemMessage(t('select_channel_first')); return; }

  captureRecognition = buildRecognition();
  if (!captureRecognition) { appendSystemMessage(t('transcription_unsupported')); return; }

  capBuffer = '';
  clearTimeout(capTimer); capTimer = null;

  function capOnResult(event) {
    let full = '';
    for (let i = 0; i < event.results.length; i++) { full += event.results[i][0].transcript; }
    capBuffer = full.trim();
    clearTimeout(capTimer);
    capTimer = setTimeout(() => { flushBuffer(capBuffer, '🎤 '); capBuffer = ''; }, SPEECH_PAUSE_MS);
  }

  function capOnEnd() {
    if (!isCapturing) return;
    if (capBuffer.trim().length > 1) { flushBuffer(capBuffer, '🎤 '); capBuffer = ''; }
    clearTimeout(capTimer); capTimer = null;
    setTimeout(() => {
      if (!isCapturing) return;
      captureRecognition = buildRecognition();
      if (!captureRecognition) return;
      capBuffer = '';
      captureRecognition.onresult = capOnResult;
      captureRecognition.onerror = (ev) => { if (ev.error !== 'no-speech' && ev.error !== 'aborted') appendSystemMessage(t('transcription_error') + ev.error); };
      captureRecognition.onend = capOnEnd;
      try { captureRecognition.start(); } catch (e) { console.log('[Cap] Restart failed:', e.message); }
    }, 200);
  }

  captureRecognition.onresult = capOnResult;
  captureRecognition.onerror = (event) => {
    if (event.error === 'no-speech' || event.error === 'aborted') return;
    appendSystemMessage(t('transcription_error') + event.error);
  };
  captureRecognition.onend = capOnEnd;

  try {
    captureRecognition.start();
    isCapturing = true;
    const btn = document.getElementById('btn-capture');
    btn.style.background = 'var(--red)';
    btn.style.color = '#fff';
    btn.style.borderColor = 'var(--red)';
    btn.textContent = '⏹';
    appendSystemMessage(t('capture_active'));
  } catch (err) {
    appendSystemMessage('⚠ ' + t('error_label') + ': ' + err.message);
  }
}

function stopAudioCapture() {
  isCapturing = false;
  if (capBuffer.trim().length > 1) { flushBuffer(capBuffer, '🎤 '); }
  capBuffer = ''; clearTimeout(capTimer); capTimer = null;
  if (captureRecognition) { try { captureRecognition.stop(); } catch {} captureRecognition = null; }
  const btn = document.getElementById('btn-capture');
  if (btn) { btn.style.background = 'none'; btn.style.color = 'var(--text3)'; btn.style.borderColor = 'var(--border)'; btn.textContent = '🔊'; }
  appendSystemMessage(t('capture_ended'));
}

    <div style="display:flex;gap:6px;margin-top:6px">
      <button onclick="sendTranscript()" style="padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:11px;cursor:pointer;font-weight:600">${t('send_to_agent')}</button>
      <button onclick="document.getElementById('transcript-area').remove()" style="padding:6px 14px;background:var(--bg4);color:var(--text2);border:none;border-radius:6px;font-size:11px;cursor:pointer">${t('cancel_btn')}</button>
    </div>`;
  document.querySelector('.chat-input-area').before(div);
}

async function sendTranscript() {
  const text = document.getElementById('transcript-text')?.value?.trim();
  if (!text || !activeView) return;
  // Send as user message
  socket.emit('message:send', { channel_id: activeView.id, content: t('meeting_transcript') + '\n' + text });
  document.getElementById('transcript-area').remove();
}

// ═══ CLEAR CHAT ═══
async function clearChat() {
  if (!activeView || activeView.type !== 'channel') return;
  if (!confirm(`${t('clear_confirm')} #${activeView.name}?\n\n${t('messages_moved')}.`)) return;
  try {
    const result = await apiFetch(`/api/channels/${activeView.id}/clear`, { method: 'POST' });
    if (result.ok) {
      document.getElementById('messages-container').innerHTML = `<div class="empty-state"><div class="icon">✅</div><p>${result.moved} ${t('messages_moved')}</p></div>`;
      // Reload channels to show chat-history if new
      loadChannels();
    }
  } catch (err) {
    appendSystemMessage(`⚠ ${t('error_label')}: ` + err.message);
  }
}

// ═══ SIDEBAR MOBILE ═══
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-backdrop').classList.toggle('active');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-backdrop').classList.remove('active');
}

// ═══ ORG SELECTOR ═══
let selectedOrg = 'default';
function selectOrg(orgId) {
  selectedOrg = orgId;
}

// ═══ MODEL SELECTOR ═══
let selectedModel = '';
let availableModels = [];

async function loadModels() {
  try {
    availableModels = await apiFetch('/api/models');
    if (availableModels.length) {
      selectedModel = availableModels[0].id;
      document.getElementById('model-btn-label').textContent = availableModels[0].name;
    }
    renderModelDropdown();
  } catch {}
}

function renderModelDropdown() {
  const dd = document.getElementById('model-dropdown');
  dd.innerHTML = '<div class="model-dropdown-title">Selecionar Modelo IA</div>' +
    availableModels.map(m =>
      `<div class="model-option ${m.id === selectedModel ? 'active' : ''}" onclick="selectModel('${m.id}','${m.name}',event)">
        <span class="mo-name">${m.name}</span>
        <span class="mo-provider">${m.provider}</span>
        <span class="mo-badge ${m.tier === 'paid' ? 'paid' : m.status === 'active' ? 'free' : 'unstable'}">${m.tier}${m.status === 'unstable' ? ' ⚠' : ''}</span>
      </div>`
    ).join('');
}

function toggleModelDropdown() {
  document.getElementById('model-dropdown').classList.toggle('open');
}

function selectModel(modelId, modelName, e) {
  e.stopPropagation();
  selectedModel = modelId;
  document.getElementById('model-btn-label').textContent = modelName;
  document.getElementById('model-dropdown').classList.remove('open');
  renderModelDropdown();
}

// Close dropdown when clicking outside
document.addEventListener('click', (e) => {
  if (!e.target.closest('.model-btn')) {
    document.getElementById('model-dropdown')?.classList.remove('open');
  }
});

// ═══ INIT ═══
// Check for SSO params
async function checkSSO() {
  const params = new URLSearchParams(window.location.search);
  const sso_user = params.get('sso_user');
  const sso_name = params.get('sso_name');
  const sso_token = params.get('sso_token');
  if (sso_user && sso_name && sso_token) {
    try {
      const res = await fetch(API + '/api/auth/sso', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: sso_user, display_name: sso_name, sso_token })
      });
      const data = await res.json();
      if (data.token) {
        token = data.token;
        currentUser = data.user;
        localStorage.setItem('i9c_token', token);
        localStorage.setItem('i9c_user', JSON.stringify(currentUser));
        // Clean URL
        window.history.replaceState({}, '', '/');
        startApp();
        return true;
      }
    } catch {}
  }
  return false;
}

(async () => {
  if (await checkSSO()) return;
  if (token && currentUser) {
  setTimeout(applyI18n, 100);
    startApp();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
  }
})();

// Periodic presence refresh
setInterval(() => { if (token) loadUsers(); }, 30000);
setInterval(() => { if (token) updateNotifBadge(); }, 15000);
// Apply i18n on load
document.addEventListener('DOMContentLoaded', () => {
  applyI18n();
  const langBtn = document.getElementById('lang-toggle');
  if (langBtn) langBtn.textContent = currentLang === 'en' ? 'PT' : 'EN';
});
</script>
