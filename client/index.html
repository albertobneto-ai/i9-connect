<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>i9 Connect</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a1a1a'/><text x='16' y='22' text-anchor='middle' font-family='Arial' font-weight='bold' font-size='16' fill='white'>i9</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111;--bg2:#1a1a1a;--bg3:#222;--bg4:#2d2d2d;
  --border:#333;--border2:#444;
  --text:#e0e0e0;--text2:#aaa;--text3:#777;
  --accent:#4a9eff;--accent2:#3a7edf;
  --green:#2ecc71;--red:#e74c3c;--orange:#f39c12;--yellow:#f1c40f;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
input,button,textarea,select{font-family:inherit;outline:none}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ═══ LOGIN ═══ */
#login-screen{display:flex;align-items:center;justify-content:center;height:100vh;background:linear-gradient(145deg,#0a0a0a,#1a1a1a)}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:40px;width:380px;text-align:center}
.login-logo{font-size:28px;font-weight:800;color:#fff;margin-bottom:4px;letter-spacing:-1px}
.login-sub{font-size:12px;color:var(--text3);margin-bottom:28px}
.login-input{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;margin-bottom:12px}
.login-input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:10px}
.login-btn:hover{background:var(--accent2)}
.login-toggle{font-size:12px;color:var(--accent);cursor:pointer;background:none;border:none}
.login-error{color:var(--red);font-size:11px;margin-bottom:8px;min-height:16px}

/* ═══ MAIN LAYOUT ═══ */
#app{display:none;height:100vh;grid-template-columns:260px 1fr 0px;grid-template-rows:1fr}
#app.active{display:grid}
#app.panel-open{grid-template-columns:260px 1fr 280px}

/* ═══ SIDEBAR ═══ */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-brand{font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.5px}
.sidebar-brand span{color:var(--accent);font-weight:400}
.sidebar-section{padding:12px 18px 6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text3);display:flex;align-items:center;justify-content:space-between}
.sidebar-section button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;line-height:1}
.sidebar-section button:hover{color:var(--accent)}
.channel-list{flex:1;overflow-y:auto;padding:4px 8px}
.channel-item{padding:7px 12px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);margin-bottom:1px;position:relative}
.channel-item:hover{background:var(--bg3)}
.channel-item.active{background:var(--bg4);color:#fff}
.channel-icon{font-size:15px;flex-shrink:0;width:20px;text-align:center}
.channel-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.channel-badge{background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:16px;text-align:center}

/* User item */
.user-item{padding:6px 12px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);margin-bottom:1px}
.user-item:hover{background:var(--bg3)}
.user-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;position:relative}
.user-avatar .status-dot{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg2)}
.status-dot.online{background:var(--green)}
.status-dot.offline{background:var(--text3)}
.status-dot.away{background:var(--orange)}
.status-dot.busy{background:var(--red)}

/* Self */
.sidebar-footer{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-footer .user-avatar{width:32px;height:32px;font-size:12px}
.self-info{flex:1;overflow:hidden}
.self-name{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.self-status{font-size:10px;color:var(--text3)}
.self-actions{display:flex;gap:6px}
.self-actions button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;padding:4px}
.self-actions button:hover{color:var(--accent)}

/* ═══ CHAT AREA ═══ */
.chat-area{display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.chat-header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);min-height:52px}
.chat-header-left{display:flex;align-items:center;gap:10px}
.chat-header-icon{font-size:18px}
.chat-header-name{font-size:15px;font-weight:600;color:#fff}
.chat-header-desc{font-size:11px;color:var(--text3)}
.chat-header-actions{display:flex;gap:4px}
.chat-header-actions button{background:none;border:1px solid var(--border);color:var(--text2);cursor:pointer;padding:6px 10px;border-radius:6px;font-size:13px;display:flex;align-items:center;gap:5px}
.chat-header-actions button:hover{background:var(--bg4);color:#fff;border-color:var(--border2)}
.chat-header-actions button.active-call{background:var(--green);color:#fff;border-color:var(--green)}

/* Messages */
.messages-container{flex:1;overflow-y:auto;padding:16px 20px}
.message{display:flex;gap:10px;margin-bottom:14px;padding:4px 8px;border-radius:6px}
.message:hover{background:rgba(255,255,255,0.02)}
.msg-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;margin-top:2px}
.msg-body{flex:1;min-width:0}
.msg-header{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.msg-author{font-size:13px;font-weight:600;color:#fff}
.msg-time{font-size:10px;color:var(--text3)}
.msg-content{font-size:13px;color:var(--text);line-height:1.5;word-wrap:break-word;white-space:pre-wrap}
.msg-content.bot{background:var(--bg3);padding:10px 14px;border-radius:0 8px 8px 8px;border-left:3px solid var(--accent);margin-top:4px}
.msg-content.system{color:var(--text3);font-style:italic;font-size:12px}

.typing-indicator{padding:4px 20px;font-size:11px;color:var(--text3);font-style:italic;min-height:20px}

/* Input */
.chat-input-area{padding:12px 20px;border-top:1px solid var(--border);background:var(--bg2)}
.chat-input-row{display:flex;gap:8px;align-items:flex-end}
.chat-input{flex:1;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;resize:none;max-height:120px;min-height:40px}
.chat-input:focus{border-color:var(--accent)}
.chat-send-btn{padding:10px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;flex-shrink:0;height:40px}
.chat-send-btn:hover{background:var(--accent2)}
.chat-send-btn:disabled{opacity:0.4;cursor:default}
.bot-hint{font-size:10px;color:var(--text3);margin-top:4px}

/* ═══ RIGHT PANEL ═══ */
.right-panel{background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-header{padding:14px 16px;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);display:flex;align-items:center;justify-content:space-between}
.panel-header button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px}
.panel-header button:hover{color:var(--red)}
.panel-content{flex:1;overflow-y:auto;padding:12px 14px}

/* Call UI */
.call-banner{background:linear-gradient(135deg,#1a472a,#2a6e3f);border:1px solid #2ecc71;border-radius:8px;padding:14px;margin-bottom:12px;text-align:center}
.call-banner h3{font-size:13px;font-weight:600;color:#2ecc71;margin-bottom:6px}
.call-banner p{font-size:11px;color:#a0d4b0;margin-bottom:10px}
.call-participants{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:10px}
.call-participant{display:flex;flex-direction:column;align-items:center;gap:4px}
.call-participant .user-avatar{width:36px;height:36px}
.call-participant span{font-size:10px;color:var(--text2)}
.call-controls{display:flex;gap:8px;justify-content:center}
.call-btn{padding:8px 14px;border:none;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px}
.call-btn.mute{background:var(--bg4);color:var(--text)}
.call-btn.mute.muted{background:var(--red);color:#fff}
.call-btn.hang{background:var(--red);color:#fff}
.call-btn:hover{opacity:0.85}

/* ═══ VIDEO CALL OVERLAY ═══ */
.call-overlay{position:fixed;inset:0;background:#0a0a0a;z-index:50;display:none;flex-direction:column}
.call-overlay.active{display:flex}
.call-top-bar{padding:12px 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.6);z-index:2}
.call-top-bar .call-title{font-size:14px;font-weight:600;color:#fff}
.call-top-bar .call-duration{font-size:12px;color:var(--text3);font-variant-numeric:tabular-nums}
.video-grid{flex:1;display:grid;gap:8px;padding:8px;align-items:center;justify-items:center;overflow:hidden}
.video-grid.grid-1{grid-template-columns:1fr}
.video-grid.grid-2{grid-template-columns:1fr 1fr}
.video-grid.grid-3,.video-grid.grid-4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.video-grid.grid-5,.video-grid.grid-6{grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr}
.video-cell{position:relative;width:100%;height:100%;background:#1a1a1a;border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.video-cell video{width:100%;height:100%;object-fit:cover;border-radius:10px}
.video-cell .video-label{position:absolute;bottom:8px;left:10px;background:rgba(0,0,0,0.65);color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;z-index:1}
.video-cell .video-muted-icon{position:absolute;top:8px;right:10px;background:rgba(229,57,53,0.8);color:#fff;font-size:10px;padding:3px 6px;border-radius:8px}
.video-cell.camera-off{background:#2d2d2d}
.video-cell.camera-off .avatar-placeholder{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff}
.local-video-wrap{position:absolute;bottom:80px;right:16px;width:180px;height:135px;border-radius:10px;overflow:hidden;border:2px solid var(--border);z-index:3;background:#1a1a1a;cursor:move}
.local-video-wrap video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
.local-video-wrap .video-label{position:absolute;bottom:4px;left:6px;background:rgba(0,0,0,0.6);color:#fff;font-size:9px;padding:2px 6px;border-radius:8px}
.local-video-wrap.camera-off{display:flex;align-items:center;justify-content:center}
.local-video-wrap.camera-off video{display:none}
.local-video-wrap.camera-off .avatar-placeholder{font-size:20px;font-weight:700;color:#fff}
.call-bottom-bar{padding:14px 20px;display:flex;align-items:center;justify-content:center;gap:12px;background:rgba(0,0,0,0.6);z-index:2}
.ctl-btn{width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
.ctl-btn.mic{background:var(--bg4);color:#fff}
.ctl-btn.mic.off{background:var(--red);color:#fff}
.ctl-btn.cam{background:var(--bg4);color:#fff}
.ctl-btn.cam.off{background:var(--red);color:#fff}
.ctl-btn.hangup{background:var(--red);color:#fff;width:56px;height:56px;font-size:20px}
.ctl-btn:hover{opacity:0.85}

/* Notification items */
.notif-item{padding:10px 12px;border-radius:6px;background:var(--bg);margin-bottom:6px;border-left:3px solid var(--accent)}
.notif-item.unread{border-left-color:var(--yellow)}
.notif-title{font-size:11px;font-weight:600;color:#fff;margin-bottom:2px}
.notif-content{font-size:11px;color:var(--text2)}
.notif-time{font-size:9px;color:var(--text3);margin-top:3px}

/* ═══ MODAL ═══ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:28px;width:360px}
.modal-box h3{font-size:15px;font-weight:700;color:#fff;margin-bottom:14px}
.modal-box .login-input{margin-bottom:10px}
.modal-box .login-btn{margin-top:6px}

/* Status selector */
.status-select{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 8px;font-size:11px;cursor:pointer}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:13px}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">i9 Connect</div>
    <div class="login-sub">Comunicação integrada ao Ever i9</div>
    <div class="login-error" id="login-error"></div>
    <input class="login-input" id="auth-display" placeholder="Nome de exibição" style="display:none">
    <input class="login-input" id="auth-user" placeholder="Usuário">
    <input class="login-input" id="auth-pass" placeholder="Senha" type="password">
    <button class="login-btn" id="auth-btn" onclick="doAuth()">Entrar</button>
    <button class="login-toggle" id="auth-toggle" onclick="toggleAuth()">Não tem conta? Criar uma</button>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">i9 <span>Connect</span></div>
      <button onclick="toggleNotifPanel()" title="Notificações" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;position:relative" id="notif-btn">
        🔔 <span id="notif-count" style="display:none;position:absolute;top:-4px;right:-6px;background:var(--red);color:#fff;font-size:8px;padding:1px 4px;border-radius:8px;font-weight:700"></span>
      </button>
    </div>

    <div class="sidebar-section">Canais <button onclick="showCreateChannel()" title="Criar canal">+</button></div>
    <div class="channel-list" id="channel-list"></div>

    <div class="sidebar-section">Mensagens Diretas <button onclick="showCreateDM()" title="Nova DM">+</button></div>
    <div class="channel-list" id="dm-list" style="max-height:180px"></div>

    <div class="sidebar-section">Online</div>
    <div class="channel-list" id="online-list" style="max-height:140px"></div>

    <div class="sidebar-footer">
      <div class="user-avatar" id="self-avatar" style="background:var(--accent)">
        <div class="status-dot online"></div>
      </div>
      <div class="self-info">
        <div class="self-name" id="self-name">—</div>
        <select class="status-select" id="self-status" onchange="setStatus(this.value)">
          <option value="online">Online</option>
          <option value="away">Ausente</option>
          <option value="busy">Ocupado</option>
        </select>
      </div>
      <div class="self-actions">
        <button onclick="logout()" title="Sair">⏻</button>
      </div>
    </div>
  </div>

  <!-- Chat Area -->
  <div class="chat-area">
    <div class="chat-header">
      <div class="chat-header-left">
        <span class="chat-header-icon" id="chat-icon">#</span>
        <div>
          <div class="chat-header-name" id="chat-name">Selecione um canal</div>
          <div class="chat-header-desc" id="chat-desc"></div>
        </div>
      </div>
      <div class="chat-header-actions">
        <button id="call-btn" onclick="toggleCall()" title="Chamada de vídeo">📹 Chamada</button>
        <button onclick="toggleRightPanel('members')" title="Membros">👥</button>
        <button onclick="toggleRightPanel('notifications')" title="Notificações">🔔</button>
      </div>
    </div>

    <div class="messages-container" id="messages-container">
      <div class="empty-state">
        <div class="icon">💬</div>
        <p>Selecione um canal para começar</p>
      </div>
    </div>

    <div class="typing-indicator" id="typing-indicator"></div>

    <div class="chat-input-area">
      <div class="chat-input-row">
        <textarea class="chat-input" id="msg-input" placeholder="Digite uma mensagem..." rows="1"
          onkeydown="handleInputKey(event)" oninput="handleTyping()"></textarea>
        <button class="chat-send-btn" onclick="sendMessage()" id="send-btn" disabled>➤</button>
      </div>
      <div class="bot-hint" id="bot-hint" style="display:none">💡 Este canal tem bot IA. Comece com <strong>@bot</strong> para perguntar algo.</div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel" id="right-panel">
    <div class="panel-header">
      <span id="panel-title">Membros</span>
      <button onclick="closeRightPanel()">✕</button>
    </div>
    <div class="panel-content" id="panel-content"></div>
  </div>
</div>

<!-- Create Channel Modal -->
<div class="modal-overlay" id="modal-channel">
  <div class="modal-box">
    <h3>Criar Canal</h3>
    <input class="login-input" id="new-ch-name" placeholder="Nome do canal (ex: vendas-b2b)">
    <input class="login-input" id="new-ch-desc" placeholder="Descrição (opcional)">
    <button class="login-btn" onclick="createChannel()">Criar</button>
    <button class="login-toggle" onclick="closeModal('modal-channel')">Cancelar</button>
  </div>
</div>

<!-- Create DM Modal -->
<div class="modal-overlay" id="modal-dm">
  <div class="modal-box">
    <h3>Nova Mensagem Direta</h3>
    <div id="dm-user-list" style="max-height:260px;overflow-y:auto"></div>
    <button class="login-toggle" onclick="closeModal('modal-dm')" style="margin-top:10px">Cancelar</button>
  </div>
</div>

<!-- Video Call Overlay -->
<div class="call-overlay" id="call-overlay">
  <div class="call-top-bar">
    <div class="call-title" id="call-channel-name">Chamada</div>
    <div class="call-duration" id="call-duration">00:00</div>
  </div>
  <div class="video-grid grid-1" id="video-grid"></div>
  <div class="local-video-wrap" id="local-video-wrap">
    <video id="local-video" autoplay muted playsinline></video>
    <div class="video-label">Você</div>
    <div class="avatar-placeholder" id="local-avatar-ph" style="display:none"></div>
  </div>
  <div class="call-bottom-bar">
    <button class="ctl-btn mic" id="btn-mic" onclick="toggleMute()" title="Microfone">🎙</button>
    <button class="ctl-btn cam" id="btn-cam" onclick="toggleCamera()" title="Câmera">📷</button>
    <button class="ctl-btn hangup" onclick="leaveCall()" title="Encerrar">📞</button>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script>
// ═══ STATE ═══
let token = localStorage.getItem('i9c_token');
let currentUser = JSON.parse(localStorage.getItem('i9c_user') || 'null');
let socket = null;
let activeView = null; // { type:'channel'|'dm', id, name }
let channels = [];
let dms = [];
let users = [];
let typingTimeout = null;
let isRegistering = false;

// WebRTC
let localStream = null;
let peerConnections = {};
let inCall = false;
let isMuted = false;
let isVideoOff = false;
let callTimerInterval = null;
let callStartTime = null;
const ICE_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' }
];

const API = '';

// ═══ AUTH ═══
function toggleAuth() {
  isRegistering = !isRegistering;
  document.getElementById('auth-display').style.display = isRegistering ? 'block' : 'none';
  document.getElementById('auth-btn').textContent = isRegistering ? 'Criar Conta' : 'Entrar';
  document.getElementById('auth-toggle').textContent = isRegistering ? 'Já tem conta? Entrar' : 'Não tem conta? Criar uma';
}

async function doAuth() {
  const username = document.getElementById('auth-user').value.trim();
  const password = document.getElementById('auth-pass').value;
  const display_name = document.getElementById('auth-display').value.trim();
  const errEl = document.getElementById('login-error');
  if (!username || !password) { errEl.textContent = 'Preencha todos os campos'; return; }
  if (isRegistering && !display_name) { errEl.textContent = 'Informe o nome de exibição'; return; }
  try {
    const endpoint = isRegistering ? '/api/auth/register' : '/api/auth/login';
    const body = isRegistering ? { username, password, display_name } : { username, password };
    const res = await fetch(API + endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || 'Erro'; return; }
    token = data.token;
    currentUser = data.user;
    localStorage.setItem('i9c_token', token);
    localStorage.setItem('i9c_user', JSON.stringify(currentUser));
    startApp();
  } catch (e) { errEl.textContent = 'Erro de conexão'; }
}

function logout() {
  localStorage.removeItem('i9c_token');
  localStorage.removeItem('i9c_user');
  if (socket) socket.disconnect();
  location.reload();
}

// ═══ APP INIT ═══
function startApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  document.getElementById('self-name').textContent = currentUser.display_name;
  const av = document.getElementById('self-avatar');
  av.style.background = currentUser.avatar_color || 'var(--accent)';
  av.childNodes[0].textContent = initials(currentUser.display_name);

  connectSocket();
  loadChannels();
  loadUsers();
  loadDMs();
}

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
}

// ═══ SOCKET ═══
function connectSocket() {
  socket = io({ auth: { token } });

  socket.on('connect', () => console.log('[WS] Connected'));
  socket.on('connect_error', (err) => { console.error('[WS] Error:', err.message); if (err.message === 'Invalid token') logout(); });

  socket.on('message:new', (msg) => {
    if (activeView?.type === 'channel' && msg.channel_id === activeView.id) {
      appendMessage(msg);
      scrollToBottom();
    }
  });

  socket.on('dm:new', (msg) => {
    if (activeView?.type === 'dm' && msg.dm_channel_id === activeView.id) {
      appendMessage(msg);
      scrollToBottom();
    }
  });

  socket.on('presence:update', (data) => {
    const idx = users.findIndex(u => u.id === data.userId);
    if (idx >= 0) users[idx].status = data.status;
    renderOnlineList();
  });

  socket.on('typing:update', (data) => {
    if (data.typing) {
      document.getElementById('typing-indicator').textContent = `${data.display_name} está digitando...`;
    } else {
      document.getElementById('typing-indicator').textContent = '';
    }
  });

  socket.on('channel:created', (ch) => {
    channels.push(ch);
    renderChannels();
  });

  socket.on('notification:new', (notif) => {
    updateNotifBadge();
  });

  // WebRTC events
  socket.on('call:started', (data) => {
    if (activeView?.type === 'channel' && data.channelId === activeView.id) {
      appendSystemMessage(`📹 ${data.startedBy} iniciou uma chamada de vídeo`);
    }
  });

  socket.on('call:joined', (data) => {
    inCall = true;
    updateCallUI();
    // Connect to existing peers
    if (data.peers) {
      for (const peerId of data.peers) {
        createPeerConnection(peerId, true);
      }
    }
  });

  socket.on('call:peer-joined', async (data) => {
    appendSystemMessage(`📹 ${data.display_name} entrou na chamada`);
  });

  socket.on('call:signal', async (data) => {
    const { from, signal } = data;
    if (signal.type === 'offer') {
      const pc = createPeerConnection(from, false);
      await pc.setRemoteDescription(new RTCSessionDescription(signal));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit('call:signal', { to: from, signal: answer });
      // Set peer label
      setTimeout(() => {
        const cell = document.getElementById('cell-' + from);
        if (cell && data.display_name) cell.querySelector('.video-label').textContent = data.display_name;
      }, 200);
    } else if (signal.type === 'answer') {
      const pc = peerConnections[from];
      if (pc) await pc.setRemoteDescription(new RTCSessionDescription(signal));
    } else if (signal.candidate) {
      const pc = peerConnections[from];
      if (pc) await pc.addIceCandidate(new RTCIceCandidate(signal));
    }
  });

  socket.on('call:peer-left', (data) => {
    if (peerConnections[data.socketId]) {
      peerConnections[data.socketId].close();
      delete peerConnections[data.socketId];
      const cell = document.getElementById('cell-' + data.socketId);
      if (cell) cell.remove();
      updateVideoGrid();
    }
    appendSystemMessage(`📹 ${data.display_name || 'Usuário'} saiu da chamada`);
  });

  socket.on('call:ended', () => {
    endCall();
    appendSystemMessage('📹 Chamada encerrada');
  });
}

// ═══ DATA LOADING ═══
async function apiFetch(url, opts = {}) {
  const res = await fetch(API + url, { ...opts, headers: { ...opts.headers, 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' } });
  return res.json();
}

async function loadChannels() {
  channels = await apiFetch('/api/channels');
  renderChannels();
  if (channels.length && !activeView) openChannel(channels[0]);
}

async function loadUsers() {
  users = await apiFetch('/api/users');
  renderOnlineList();
}

async function loadDMs() {
  dms = await apiFetch('/api/dms');
  renderDMs();
}

// ═══ RENDERING ═══
function renderChannels() {
  const el = document.getElementById('channel-list');
  el.innerHTML = channels.map(ch =>
    `<div class="channel-item ${activeView?.type==='channel'&&activeView?.id===ch.id?'active':''}" onclick="openChannel(${JSON.stringify(ch).replace(/"/g,'&quot;')})">
      <span class="channel-icon">#</span>
      <span class="channel-name">${ch.name}</span>
    </div>`
  ).join('');
}

function renderDMs() {
  const el = document.getElementById('dm-list');
  el.innerHTML = dms.map(dm =>
    `<div class="channel-item ${activeView?.type==='dm'&&activeView?.id===dm.id?'active':''}" onclick="openDM(${JSON.stringify(dm).replace(/"/g,'&quot;')})">
      <div class="user-avatar" style="background:${dm.other_color||'#555'};width:22px;height:22px;font-size:9px">
        ${initials(dm.other_name)}
        <div class="status-dot ${dm.other_status||'offline'}" style="width:8px;height:8px;border-width:1.5px"></div>
      </div>
      <span class="channel-name">${dm.other_name}</span>
    </div>`
  ).join('');
}

function renderOnlineList() {
  const online = users.filter(u => u.status === 'online' && u.id !== currentUser.id);
  const el = document.getElementById('online-list');
  el.innerHTML = online.map(u =>
    `<div class="user-item">
      <div class="user-avatar" style="background:${u.avatar_color||'#555'}">
        ${initials(u.display_name)}
        <div class="status-dot online"></div>
      </div>
      <span>${u.display_name}</span>
    </div>`
  ).join('') || '<div style="padding:8px 12px;font-size:11px;color:var(--text3)">Ninguém online</div>';
}

// ═══ CHANNEL / DM OPEN ═══
async function openChannel(ch) {
  activeView = { type: 'channel', id: ch.id, name: ch.name };
  document.getElementById('chat-icon').textContent = '#';
  document.getElementById('chat-name').textContent = ch.name;
  document.getElementById('chat-desc').textContent = ch.description || '';
  document.getElementById('bot-hint').style.display = ch.name === 'bot-ia' ? 'block' : 'none';
  document.getElementById('msg-input').placeholder = ch.name === 'bot-ia' ? '@bot sua pergunta...' : 'Digite uma mensagem...';
  renderChannels();
  renderDMs();
  socket.emit('channel:join', ch.id);
  const msgs = await apiFetch(`/api/channels/${ch.id}/messages`);
  renderMessages(msgs);
  scrollToBottom();
}

async function openDM(dm) {
  activeView = { type: 'dm', id: dm.id, name: dm.other_name };
  document.getElementById('chat-icon').textContent = '✉';
  document.getElementById('chat-name').textContent = dm.other_name;
  document.getElementById('chat-desc').textContent = 'Mensagem direta';
  document.getElementById('bot-hint').style.display = 'none';
  renderChannels();
  renderDMs();
  const msgs = await apiFetch(`/api/dms/${dm.id}/messages`);
  renderMessages(msgs);
  scrollToBottom();
}

function renderMessages(msgs) {
  const container = document.getElementById('messages-container');
  if (!msgs.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">💬</div><p>Nenhuma mensagem ainda. Comece a conversa!</p></div>';
    return;
  }
  container.innerHTML = msgs.map(m => messageHTML(m)).join('');
}

function messageHTML(m) {
  const isBot = m.type === 'bot' || m.type === 'system';
  const contentClass = m.type === 'bot' ? 'msg-content bot' : m.type === 'system' ? 'msg-content system' : 'msg-content';
  const time = new Date(m.created_at).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  return `<div class="message">
    <div class="msg-avatar" style="background:${m.avatar_color || '#555'}">${initials(m.display_name || '?')}</div>
    <div class="msg-body">
      <div class="msg-header">
        <span class="msg-author">${m.display_name || 'Sistema'}</span>
        <span class="msg-time">${time}</span>
      </div>
      <div class="${contentClass}">${escapeHtml(m.content)}</div>
    </div>
  </div>`;
}

function appendMessage(m) {
  const container = document.getElementById('messages-container');
  if (container.querySelector('.empty-state')) container.innerHTML = '';
  container.insertAdjacentHTML('beforeend', messageHTML(m));
}

function appendSystemMessage(text) {
  const container = document.getElementById('messages-container');
  container.insertAdjacentHTML('beforeend',
    `<div class="message"><div class="msg-body"><div class="msg-content system">${text}</div></div></div>`);
  scrollToBottom();
}

function scrollToBottom() {
  const c = document.getElementById('messages-container');
  setTimeout(() => c.scrollTop = c.scrollHeight, 50);
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ═══ SEND MESSAGE ═══
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content || !activeView) return;

  // Bot query
  if (activeView.type === 'channel' && content.toLowerCase().startsWith('@bot')) {
    const question = content.replace(/^@bot\s*/i, '');
    // Send user message first
    socket.emit('message:send', { channel_id: activeView.id, content });
    input.value = '';
    input.style.height = 'auto';
    updateSendBtn();
    // Ask bot
    await apiFetch('/api/bot/ask', { method: 'POST', body: JSON.stringify({ question, channel_id: activeView.id }) });
    return;
  }

  if (activeView.type === 'channel') {
    socket.emit('message:send', { channel_id: activeView.id, content });
  } else if (activeView.type === 'dm') {
    socket.emit('dm:send', { dm_channel_id: activeView.id, content });
  }
  input.value = '';
  input.style.height = 'auto';
  updateSendBtn();
  socket.emit('typing:stop', { channel_id: activeView?.id });
}

function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  updateSendBtn();
}

function updateSendBtn() {
  document.getElementById('send-btn').disabled = !document.getElementById('msg-input').value.trim();
}

function handleTyping() {
  updateSendBtn();
  if (!activeView) return;
  socket.emit('typing:start', { channel_id: activeView.id });
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => socket.emit('typing:stop', { channel_id: activeView.id }), 2000);
  // Auto-resize
  const input = document.getElementById('msg-input');
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
}

// ═══ STATUS ═══
function setStatus(status) {
  socket.emit('status:set', { status });
}

// ═══ CREATE CHANNEL / DM ═══
function showCreateChannel() { document.getElementById('modal-channel').classList.add('active'); }
function showCreateDM() {
  const list = document.getElementById('dm-user-list');
  const others = users.filter(u => u.id !== currentUser.id && u.role !== 'bot');
  list.innerHTML = others.map(u =>
    `<div class="user-item" onclick="startDM(${u.id})" style="cursor:pointer">
      <div class="user-avatar" style="background:${u.avatar_color||'#555'}">${initials(u.display_name)}<div class="status-dot ${u.status}"></div></div>
      <span>${u.display_name}</span>
    </div>`
  ).join('') || '<p style="padding:10px;color:var(--text3);font-size:12px">Nenhum outro usuário cadastrado</p>';
  document.getElementById('modal-dm').classList.add('active');
}
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

async function createChannel() {
  const name = document.getElementById('new-ch-name').value.trim().toLowerCase().replace(/\s+/g, '-');
  const description = document.getElementById('new-ch-desc').value.trim();
  if (!name) return;
  await apiFetch('/api/channels', { method: 'POST', body: JSON.stringify({ name, description }) });
  closeModal('modal-channel');
  document.getElementById('new-ch-name').value = '';
  document.getElementById('new-ch-desc').value = '';
  loadChannels();
}

async function startDM(userId) {
  const dm = await apiFetch('/api/dms', { method: 'POST', body: JSON.stringify({ user_id: userId }) });
  closeModal('modal-dm');
  await loadDMs();
  const found = dms.find(d => d.id === dm.id);
  if (found) openDM(found);
}

// ═══ RIGHT PANEL ═══
function toggleRightPanel(view) {
  const app = document.getElementById('app');
  const isOpen = app.classList.contains('panel-open');
  if (isOpen) { closeRightPanel(); return; }
  app.classList.add('panel-open');
  document.getElementById('panel-title').textContent = view === 'notifications' ? 'Notificações' : 'Membros';
  if (view === 'notifications') loadNotifications();
  else renderMembersPanel();
}

function toggleNotifPanel() { toggleRightPanel('notifications'); }

function closeRightPanel() { document.getElementById('app').classList.remove('panel-open'); }

function renderMembersPanel() {
  const el = document.getElementById('panel-content');
  const online = users.filter(u => u.status === 'online');
  const offline = users.filter(u => u.status !== 'online');
  el.innerHTML = `
    <div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:8px">ONLINE — ${online.length}</div>
    ${online.map(u => `<div class="user-item"><div class="user-avatar" style="background:${u.avatar_color||'#555'}">${initials(u.display_name)}<div class="status-dot online"></div></div><span>${u.display_name}</span></div>`).join('')}
    <div style="font-size:11px;font-weight:600;color:var(--text3);margin:12px 0 8px">OFFLINE — ${offline.length}</div>
    ${offline.map(u => `<div class="user-item"><div class="user-avatar" style="background:${u.avatar_color||'#555'}">${initials(u.display_name)}<div class="status-dot offline"></div></div><span style="color:var(--text3)">${u.display_name}</span></div>`).join('')}
  `;
}

async function loadNotifications() {
  const notifs = await apiFetch('/api/notifications');
  const el = document.getElementById('panel-content');
  if (!notifs.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">Sem notificações</div>';
    return;
  }
  el.innerHTML = `<button class="login-toggle" onclick="markAllRead()" style="margin-bottom:10px;font-size:11px">Marcar todas como lidas</button>` +
    notifs.map(n => {
      const time = new Date(n.created_at).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
      return `<div class="notif-item ${n.read?'':'unread'}">
        <div class="notif-title">${n.title || n.type}</div>
        <div class="notif-content">${n.content || ''}</div>
        <div class="notif-time">${time}</div>
      </div>`;
    }).join('');
}

async function markAllRead() {
  await apiFetch('/api/notifications/read-all', { method: 'POST' });
  loadNotifications();
  updateNotifBadge();
}

async function updateNotifBadge() {
  try {
    const notifs = await apiFetch('/api/notifications');
    const unread = notifs.filter(n => !n.read).length;
    const badge = document.getElementById('notif-count');
    if (unread > 0) { badge.textContent = unread; badge.style.display = 'inline'; }
    else { badge.style.display = 'none'; }
  } catch {}
}

// ═══ WEBRTC VIDEO CALLS ═══
async function toggleCall() {
  if (inCall) {
    leaveCall();
    return;
  }
  if (!activeView || activeView.type !== 'channel') return;
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
    // Show local preview
    const localVideo = document.getElementById('local-video');
    localVideo.srcObject = localStream;
    document.getElementById('local-avatar-ph').textContent = initials(currentUser.display_name);
    document.getElementById('local-avatar-ph').style.background = currentUser.avatar_color || '#555';
    // Show overlay
    document.getElementById('call-overlay').classList.add('active');
    document.getElementById('call-channel-name').textContent = '#' + activeView.name;
    // Start timer
    callStartTime = Date.now();
    callTimerInterval = setInterval(updateCallDuration, 1000);
    // Check for active call or start new
    const activeCalls = await apiFetch('/api/calls/active');
    const existingCall = activeCalls.find(c => c.channel_id === activeView.id);
    if (existingCall) {
      socket.emit('call:join', { call_id: existingCall.id });
    } else {
      socket.emit('call:start', { channel_id: activeView.id });
    }
  } catch (err) {
    console.error('Media error:', err);
    appendSystemMessage('⚠ Permissão de câmera/microfone negada. Verifique as permissões do browser.');
  }
}

function leaveCall() {
  socket.emit('call:leave');
  endCall();
}

function createPeerConnection(peerId, initiator) {
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  peerConnections[peerId] = pc;

  if (localStream) {
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
  }

  pc.onicecandidate = (e) => {
    if (e.candidate) {
      socket.emit('call:signal', { to: peerId, signal: e.candidate });
    }
  };

  pc.ontrack = (e) => {
    let cell = document.getElementById('cell-' + peerId);
    if (!cell) {
      cell = document.createElement('div');
      cell.id = 'cell-' + peerId;
      cell.className = 'video-cell';
      cell.innerHTML = '<video autoplay playsinline></video><div class="video-label">Participante</div>';
      document.getElementById('video-grid').appendChild(cell);
      updateVideoGrid();
    }
    cell.querySelector('video').srcObject = e.streams[0];
  };

  if (initiator) {
    pc.createOffer().then(offer => {
      pc.setLocalDescription(offer);
      socket.emit('call:signal', { to: peerId, signal: offer });
    });
  }

  return pc;
}

function endCall() {
  inCall = false;
  isMuted = false;
  isVideoOff = false;
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  Object.values(peerConnections).forEach(pc => pc.close());
  peerConnections = {};
  // Clean overlay
  document.getElementById('video-grid').innerHTML = '';
  document.getElementById('call-overlay').classList.remove('active');
  document.getElementById('local-video').srcObject = null;
  // Reset buttons
  document.getElementById('btn-mic').classList.remove('off');
  document.getElementById('btn-cam').classList.remove('off');
  document.getElementById('local-video-wrap').classList.remove('camera-off');
  // Timer
  if (callTimerInterval) { clearInterval(callTimerInterval); callTimerInterval = null; }
  updateCallUI();
}

function toggleMute() {
  if (!localStream) return;
  isMuted = !isMuted;
  localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
  const btn = document.getElementById('btn-mic');
  btn.classList.toggle('off', isMuted);
  btn.textContent = isMuted ? '🔇' : '🎙';
}

function toggleCamera() {
  if (!localStream) return;
  isVideoOff = !isVideoOff;
  localStream.getVideoTracks().forEach(t => t.enabled = !isVideoOff);
  const btn = document.getElementById('btn-cam');
  btn.classList.toggle('off', isVideoOff);
  btn.textContent = isVideoOff ? '🚫' : '📷';
  const wrap = document.getElementById('local-video-wrap');
  if (isVideoOff) {
    wrap.classList.add('camera-off');
    document.getElementById('local-avatar-ph').style.display = 'flex';
  } else {
    wrap.classList.remove('camera-off');
    document.getElementById('local-avatar-ph').style.display = 'none';
  }
}

function updateVideoGrid() {
  const grid = document.getElementById('video-grid');
  const count = grid.children.length;
  grid.className = 'video-grid grid-' + Math.min(count || 1, 6);
}

function updateCallDuration() {
  if (!callStartTime) return;
  const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
  const min = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const sec = String(elapsed % 60).padStart(2, '0');
  document.getElementById('call-duration').textContent = min + ':' + sec;
}

function updateCallUI() {
  const btn = document.getElementById('call-btn');
  if (inCall) {
    btn.classList.add('active-call');
    btn.innerHTML = '📹 Na chamada';
  } else {
    btn.classList.remove('active-call');
    btn.innerHTML = '📹 Chamada';
  }
}

// ═══ INIT ═══
if (token && currentUser) {
  startApp();
} else {
  document.getElementById('login-screen').style.display = 'flex';
}

// Periodic presence refresh
setInterval(() => { if (token) loadUsers(); }, 30000);
setInterval(() => { if (token) updateNotifBadge(); }, 15000);
</script>
